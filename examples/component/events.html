<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events — nanopub-table component</title>
  <script type="module" src="../../dist/nanopub-elements.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    nanopub-table table { border-collapse: collapse; width: 100%; }
    nanopub-table th, nanopub-table td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; }
    nanopub-table th { background: #f5f5f5; font-weight: 600; }
    nanopub-table time { font-size: 0.85em; color: #666; }
  </style>
</head>
<body>

  <h1>3PFF events examples</h1>

  <h2>Default rendering</h2>

  <!--
    columns: JSON array of { field, label, type? }
    type can be "text" (default), "link", or "date"
    If columns is omitted, all fields from the query result are shown with their raw field names as headers.
  -->
  <nanopub-table
    query-template="RAkdyQ9BzXmooOF30BsFSNOs8EsSivp5k-eL293diNKXk/get-3pff-events"
    date-field="Date"
    columns='[
      {"field":"Event_Name","label":"Event"},
      {"field":"Date","label":"Date","type":"date"},
      {"field":"Organizers","label":"Organizers"},
      {"field":"Facilitators","label":"Facilitators"},
      {"field":"More_Info","label":"More Info","type":"link"}
    ]'
  ></nanopub-table>

  <h2>Minimal columns</h2>

  <nanopub-table
    query-template="RAkdyQ9BzXmooOF30BsFSNOs8EsSivp5k-eL293diNKXk/get-3pff-events"
    date-field="Date"
    columns='[
      {"field":"Event_Name","label":"Event"},
      {"field":"Date","label":"Date","type":"date"},
      {"field":"More_Info","label":"Link","type":"link"}
    ]'
  ></nanopub-table>

  <h2>Custom cells via &lt;template&gt;</h2>

  <!--
    A <template> child gives full control over cell markup, so links can have
    labels that differ from their href. Here Event_ID is rendered as
    <a href="{full IRI}">{short label}</a> using two bindings on the same <a>.
    Headers still come from the columns attribute.
  -->
  <nanopub-table
    query-template="RAkdyQ9BzXmooOF30BsFSNOs8EsSivp5k-eL293diNKXk/get-3pff-events"
    date-field="Date"
    columns='[
      {"field":"Event_ID","label":"Event ID"},
      {"field":"Event_Name","label":"Event Name"},
      {"field":"Date","label":"Date"},
      {"field":"More_Info","label":"More Info"}
    ]'
  >
    <template>
      <tr>
        <td><a data-bind-href="Event_ID" data-bind="Event_ID__label"></a></td>
        <td data-bind="Event_Name"></td>
        <td><time data-bind="Date"></time></td>
        <td><a data-bind-href="More_Info">more info</a></td>
      </tr>
    </template>
  </nanopub-table>

</body>
</html>
