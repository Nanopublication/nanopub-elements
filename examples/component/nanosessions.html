<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nanosessions — nanopub-list component</title>
  <script type="module" src="../../dist/nanopub-elements.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    nanopub-list ul { list-style: none; padding: 0; }
    nanopub-list li { padding: 0.6rem 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

  <h1>Nanosessions example</h1>

  <nanopub-list
    query-template="RAtZM16vOCcoQ_W_nDS3lKwp2oOIZc515ZS2fz4X-IG2g/get-sub-resources"
    params='{"super_resource":"https://w3id.org/spaces/nanopub/nanosessions"}'
    title-field="resource_label"
    link-field="resource"
    sort="asc"
  ></nanopub-list>

</body>
</html>
