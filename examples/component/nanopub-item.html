<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nanopub item — nanopub-item component</title>
  <script type="module" src="../../dist/nanopub-elements.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    nanopub-item { display: block; margin-bottom: 2rem; }
    nanopub-item h3 { margin: 0 0 0.25rem; }
    nanopub-item em { color: #666; font-size: 0.9em; }
  </style>
</head>
<body>

  <h1>Nanopub item example</h1>

  <h2>Default rendering (no template)</h2>

  <nanopub-item uri="https://w3id.org/np/RAyR70F27VTtlBdsxLaDsuoMFG6nJ_QljDKbz8muqn7O0"></nanopub-item>

  <h2>Custom template</h2>

  <nanopub-item uri="https://w3id.org/np/RAyR70F27VTtlBdsxLaDsuoMFG6nJ_QljDKbz8muqn7O0">
    <template>
      <h3 data-bind="label"></h3>
      <p><em data-bind="startDate" data-format="datetime"></em></p>
      <div data-bind-html="description"></div>
    </template>
  </nanopub-item>

</body>
</html>
