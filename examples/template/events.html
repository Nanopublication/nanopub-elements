<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events — HTML template</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; font-weight: 600; }
    time { font-size: 0.85em; color: #666; }
  </style>
</head>
<body>

  <h1>3PFF events example</h1>

  <template id="event-tpl">
    <tr>
      <td><strong data-bind="Event_Name"></strong></td>
      <td><time data-bind="Date"></time></td>
      <td data-bind="Organizers"></td>
      <td data-bind="Facilitators"></td>
      <td><a data-bind-href="More_Info">more info</a></td>
    </tr>
  </template>

  <p id="loading">Loading…</p>
  <table id="events" hidden>
    <thead>
      <tr>
        <th>Event</th>
        <th>Date</th>
        <th>Organizers</th>
        <th>Facilitators</th>
        <th>More Info</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import { NanopubClient } from '../../dist/nanopub-elements.js';

    const client = new NanopubClient();
    const tpl = document.querySelector('#event-tpl');
    const tbody = document.querySelector('#events tbody');
    const table = document.querySelector('#events');
    const loading = document.querySelector('#loading');

    function applyBindings(clone, row) {
      clone.querySelectorAll('[data-bind]').forEach(el => {
        el.textContent = row[el.dataset.bind] ?? '';
      });
      clone.querySelectorAll('[data-bind-href]').forEach(el => {
        const href = row[el.dataset.bindHref] ?? '';
        if (href) {
          el.href = href;
        } else {
          el.removeAttribute('href');
          el.textContent = '';
        }
      });
    }

    const rows = [];

    for await (const row of client.runQueryTemplate(
      'RAkdyQ9BzXmooOF30BsFSNOs8EsSivp5k-eL293diNKXk/get-3pff-events', {}
    )) {
      rows.push(row);
    }

    loading.remove();

    rows.sort((a, b) => new Date(b.Date) - new Date(a.Date));

    for (const row of rows) {
      const clone = tpl.content.cloneNode(true);
      applyBindings(clone, row);
      tbody.appendChild(clone);
    }

    table.hidden = false;
  </script>

</body>
</html>
