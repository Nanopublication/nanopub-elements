<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News — HTML template</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    #news { list-style: none; padding: 0; }
    #news li { padding: 0.6rem 0; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 0.2rem; }
    #news time { font-size: 0.85em; color: #666; }
  </style>
</head>
<body>

  <h1>Knowledge Pixels news example</h1>

  <template id="news-tpl">
    <li>
      <time></time>
      <span></span>  <!-- text field contains HTML, inserted separately below -->
      <a>link</a>
    </li>
  </template>

  <p id="loading">Loading…</p>
  <ul id="news"></ul>

  <script type="module">
    // TODO: replace with CDN when available
    import { NanopubClient } from '../../dist/nanopub-elements.js';
    import DOMPurify from 'https://esm.sh/dompurify';

    const client = new NanopubClient();
    const tpl = document.querySelector('#news-tpl');
    const ul = document.querySelector('#news');
    const loading = document.querySelector('#loading');

    const rows = [];

    for await (const row of client.runQueryTemplate(
      'RAOGCU2nQzZ0aE2iXwJ20jJtnZsjVR0pfFg0qlSxYtBIA/get-news-content',
      { resource: 'https://w3id.org/spaces/knowledgepixels' }
    )) {
      rows.push(row);
    }

    loading.remove();

    rows.sort((a, b) => new Date(b.datePublished) - new Date(a.datePublished));

    for (const row of rows) {
      const clone = tpl.content.cloneNode(true);

      const time = clone.querySelector('time');
      time.dateTime = row.datePublished ?? '';
      time.textContent = row.datePublished ?? '';

      // text field contains HTML — sanitize before inserting
      clone.querySelector('span').innerHTML = DOMPurify.sanitize(row.text ?? '');

      const a = clone.querySelector('a');
      if (row.link) {
        a.href = row.link;
      } else {
        a.remove();
      }

      ul.appendChild(clone);
    }
  </script>

</body>
</html>
